# VPS deployment: bot + continuous SQLite backup (Litestream).
#
#   docker compose up -d --build          # build locally
#   IMAGE=ghcr.io/<owner>/quickpredict:latest docker compose up -d   # or run the CI image
#
# The SQLite file (users' encrypted wallet keys!) lives in the named volume
# `quickpredict-data` and is streamed off-host by Litestream. See DEPLOY.md.
services:
  bot:
    image: ${IMAGE:-quickpredict:local}
    build: .
    container_name: quickpredict
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/quick-predict.db
    volumes:
      - quickpredict-data:/data
    stop_grace_period: 30s

  litestream:
    image: litestream/litestream:latest
    container_name: quickpredict-litestream
    restart: unless-stopped
    command: replicate -config /etc/litestream.yml
    env_file: .env # provides LITESTREAM_ACCESS_KEY_ID / LITESTREAM_SECRET_ACCESS_KEY
    volumes:
      - quickpredict-data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    depends_on:
      - bot

volumes:
  quickpredict-data:
