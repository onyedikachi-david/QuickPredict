name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push the image to GHCR

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  # Publish the image to GHCR — the artifact a VPS (docker compose) pulls,
  # and a tagged history of every deployable build.
  build-and-push:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploys to Fly when the FLY_API_TOKEN secret is configured; otherwise
  # skips cleanly so CI stays green before the Fly app exists.
  deploy-fly:
    needs: [typecheck, build-and-push]
    runs-on: ubuntu-latest
    concurrency: deploy-group # never two deploys at once (single-machine app)
    steps:
      - uses: actions/checkout@v4
      - name: Check for Fly token
        id: fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "FLY_API_TOKEN not set — skipping Fly deploy (see DEPLOY.md)" >> "$GITHUB_STEP_SUMMARY"
          fi
      - if: steps.fly.outputs.configured == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master
      - if: steps.fly.outputs.configured == 'true'
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
